<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaLearn - Interactive Java Compiler</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #e67e22; /* Java Orange */
            --secondary: #d35400;
            --bg: #fdf2e9;
            --editor-bg: #2d3436;
            --text-light: #dfe6e9;
            --console-bg: #fff;
            --error: #e74c3c;
            --success: #27ae60;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .brand { display: flex; align-items: center; gap: 10px; }
        .brand h1 { font-size: 1.5rem; }
        .brand i { color: var(--primary); font-size: 1.8rem; }

        /* LAYOUT */
        .container {
            display: flex;
            flex: 1;
            height: calc(100vh - 70px);
            padding: 15px;
            gap: 15px;
        }

        @media (max-width: 768px) { .container { flex-direction: column; } }

        /* LEFT: EDITOR */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .panel-header {
            padding: 12px 20px;
            background: #ecf0f1;
            border-bottom: 2px solid #bdc3c7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-name { font-weight: bold; color: #555; display: flex; align-items: center; gap: 5px; }

        .controls { display: flex; gap: 8px; }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }

        .btn-run { background-color: var(--success); color: white; }
        .btn-run:hover { background-color: #219150; transform: translateY(-1px); }

        .btn-download { background-color: var(--primary); color: white; }
        .btn-download:hover { background-color: var(--secondary); }

        .btn-reset { background-color: #95a5a6; color: white; }
        .btn-reset:hover { background-color: #7f8c8d; }

        textarea#code-editor {
            flex: 1;
            background-color: var(--editor-bg);
            color: var(--text-light);
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 16px;
            padding: 20px;
            border: none;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        /* RIGHT: OUTPUT */
        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .console-box {
            flex: 1;
            background: var(--console-bg);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .console-header {
            background: #f8f9fa;
            padding: 10px 15px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            color: #555;
            font-weight: bold;
        }

        #output {
            flex: 1;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
            background-color: #fafafa;
        }

        .stats { font-size: 0.8rem; color: #888; margin-top: 5px; }

        /* Messages */
        .err-msg { 
            color: #c0392b; 
            background: #fadbd8; 
            padding: 8px; 
            border-left: 4px solid #c0392b; 
            margin-bottom: 5px;
            border-radius: 4px;
        }
        .success-msg { color: #27ae60; font-weight: bold; }
        
        /* WARNINGS */
        .ai-badge {
            background: #ffeba7;
            color: #5d4037;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid #ffe082;
        }

        /* TOAST */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        /* INTELLIGENT HELP BOX */
        .help-box {
            background: #fff;
            border: 2px solid var(--primary);
            border-radius: 8px;
            padding: 15px;
            display: none;
            box-shadow: 0 5px 15px rgba(230, 126, 34, 0.2);
            animation: slideUp 0.3s ease-out;
        }
        .help-box.active { display: block; }
        @keyframes slideUp { from {transform: translateY(20px); opacity:0;} to {transform: translateY(0); opacity:1;} }

        .yt-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #ff0000;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(255,0,0,0.2);
            transition: 0.3s;
        }
        .yt-btn:hover { background: #cc0000; box-shadow: 0 6px 8px rgba(255,0,0,0.3); }

    </style>
</head>
<body>

    <div id="toast"><i class="fas fa-hand-paper"></i> No Copy-Pasting! Write code to learn.</div>

    <header>
        <div class="brand">
            <i class="fab fa-java"></i>
            <div>
                <h1>JavaLearn</h1>
                <span style="font-size:0.8rem; opacity:0.8;">Beginner Java Compiler</span>
            </div>
        </div>
        <div class="ai-badge"><i class="fas fa-robot"></i> Anti-AI Active</div>
    </header>

    <div class="container">
        
        <div class="editor-panel">
            <div class="panel-header">
                <span class="file-name"><i class="far fa-file-code"></i> Main.java</span>
                <div class="controls">
                    <button class="btn-reset" onclick="resetCode()"><i class="fas fa-undo"></i> Reset</button>
                    <button class="btn-download" onclick="downloadCode()"><i class="fas fa-download"></i> Save</button>
                    <button class="btn-run" id="run-btn" onclick="runJava()"><i class="fas fa-play"></i> Run Code</button>
                </div>
            </div>
            <textarea id="code-editor" spellcheck="false" placeholder="// Write your Java code here..."></textarea>
        </div>

        <div class="output-panel">
            
            <div class="console-box">
                <div class="console-header">
                    <span><i class="fas fa-terminal"></i> Output Console</span>
                    <button onclick="clearOutput()" style="background:none; border:none; cursor:pointer; color:#888;">Clear</button>
                </div>
                <div id="output">
                    <div style="color:#aaa; font-style:italic;">Ready to compile and run...</div>
                </div>
            </div>

            <div class="help-box" id="help-box">
                <h3 style="color: #d35400; margin-bottom:5px;"><i class="fas fa-bug"></i> Java Error Detected!</h3>
                <p id="error-explanation" style="color:#555; line-height:1.5;">Explanation goes here...</p>
                <a href="#" target="_blank" id="yt-link" class="yt-btn">
                    <i class="fab fa-youtube"></i> Watch Solution on YouTube
                </a>
            </div>

        </div>
    </div>

    <script>
        // ---------------------------------------------------------
        // 1. CONFIGURATION & STATE
        // ---------------------------------------------------------
        const editor = document.getElementById("code-editor");
        const output = document.getElementById("output");
        const API_URL = "https://emkc.org/api/v2/piston/execute";
        
        // Java Boilerplate (Beginners often forget this)
        const DEFAULT_CODE = `public class Main {
    public static void main(String[] args) {
        // Your code starts here
        System.out.println("Hello, Java Learner!");
        
        int x = 10;
        int y = 20;
        System.out.println("Sum: " + (x + y));
    }
}`;

        // Load Default Code on Start
        window.onload = () => {
            if(editor.value.trim() === "") {
                editor.value = DEFAULT_CODE;
            }
        };

        // ---------------------------------------------------------
        // 2. ANTI-CHEAT & ANTI-AI SYSTEM
        // ---------------------------------------------------------
        editor.addEventListener('paste', (e) => {
            e.preventDefault();
            showToast("🚫 Don't Cheat! Typing creates muscle memory.");
        });

        editor.addEventListener('copy', (e) => {
            e.preventDefault();
            showToast("🚫 No copying output! Read and understand it.");
        });

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerHTML = msg;
            t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
        }

        // ---------------------------------------------------------
        // 3. CORE COMPILER LOGIC (Uses Piston API)
        // ---------------------------------------------------------
        async function runJava() {
            const code = editor.value;
            const runBtn = document.getElementById("run-btn");
            const helpBox = document.getElementById("help-box");
            
            // Reset UI
            output.innerHTML = "";
            helpBox.classList.remove("active");
            runBtn.disabled = true;
            runBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Compiling...';

            // Anti-AI Filter
            if (code.includes("ChatGPT") || code.includes("OpenAI") || code.includes("model")) {
                addToOutput("⚠️ Security Alert: AI-generated code signature detected.", true);
                runBtn.disabled = false;
                runBtn.innerHTML = '<i class="fas fa-play"></i> Run Code';
                return;
            }

            // Piston API Payload
            const data = {
                language: "java",
                version: "15.0.2",
                files: [{ name: "Main.java", content: code }]
            };

            const startTime = performance.now();

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                const endTime = performance.now();
                const duration = ((endTime - startTime) / 1000).toFixed(2);

                if (result.run.stderr) {
                    // ERROR HAPPENED
                    handleError(result.run.stderr);
                } else {
                    // SUCCESS
                    addToOutput(result.run.stdout);
                    addToOutput(`\n✨ Success! Execution time: ${duration}s`, false, true);
                    triggerConfetti(); // REWARD
                }

            } catch (err) {
                addToOutput("🌐 Connection Error: Could not reach the compiler server.", true);
            } finally {
                runBtn.disabled = false;
                runBtn.innerHTML = '<i class="fas fa-play"></i> Run Code';
            }
        }

        // ---------------------------------------------------------
        // 4. INTELLIGENT ERROR HANDLER (Java Specific)
        // ---------------------------------------------------------
        function handleError(errorText) {
            addToOutput(errorText, true);

            const helpBox = document.getElementById("help-box");
            const explanation = document.getElementById("error-explanation");
            const ytBtn = document.getElementById("yt-link");

            // Common Java Errors Regex
            let errorType = "Java Error";
            
            if(errorText.includes("SyntaxError") || errorText.includes("; expected")) errorType = "Java Syntax Error (Missing Semicolon?)";
            else if(errorText.includes("NullPointerException")) errorType = "Java NullPointerException";
            else if(errorText.includes("ArrayIndexOutOfBoundsException")) errorType = "Java Array Index Out Of Bounds";
            else if(errorText.includes("cannot find symbol")) errorType = "Java Cannot Find Symbol (Variable not declared)";
            else if(errorText.includes("class, interface, or enum expected")) errorType = "Java Class Structure Error";

            // Update Help Box
            helpBox.classList.add("active");
            explanation.innerHTML = `It looks like you have a <strong>${errorType}</strong>.<br>Read the red text above to find the line number.`;
            
            // Dynamic YouTube Search
            const query = `how to fix ${errorType} for beginners`;
            ytBtn.href = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
        }

        // ---------------------------------------------------------
        // 5. HELPER FUNCTIONS
        // ---------------------------------------------------------
        function addToOutput(text, isError = false, isSuccess = false) {
            const div = document.createElement("div");
            if(isError) div.className = "err-msg";
            else if(isSuccess) div.className = "stats success-msg";
            else div.style.marginBottom = "5px";
            
            div.innerText = text;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        function clearOutput() {
            output.innerHTML = "";
            document.getElementById("help-box").classList.remove("active");
        }

        function resetCode() {
            if(confirm("Are you sure? This will delete your current code.")) {
                editor.value = DEFAULT_CODE;
            }
        }

        function downloadCode() {
            const blob = new Blob([editor.value], { type: "text/java" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Main.java";
            link.click();
        }

        function triggerConfetti() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        }

    </script>
</body>
</html>
